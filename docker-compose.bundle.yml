# kbgen — distribution bundle.
#
# References the three pre-built images a recipient will `docker load` from
# the tarball. No `build:` directives — all images arrive via docker save /
# docker load.
#
# Recipient workflow:
#   docker load -i kbgen-bundle.tar
#   export DATABASE_URL='postgresql+asyncpg://user:pass@pg-host:5432/kbgen'
#   export OPENAI_API_KEY='sk-proj-...'
#   docker compose -f docker-compose.bundle.yml up -d
#   open http://localhost:8004

services:
  glpi-db:
    image: kbgen/glpi-db:1.0
    container_name: kbgen-glpi-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: glpi_root_2026
      MARIADB_DATABASE: glpidb
      MARIADB_USER: glpi
      MARIADB_PASSWORD: glpi_dev_2026
    # No volume — the 135-ticket seed data is baked INTO the committed image.
    # If you want persistence across `docker compose down`, uncomment:
    # volumes: [kbgen-glpi-db-data:/var/lib/mysql]
    healthcheck:
      test: ["CMD-SHELL", "mariadb -uglpi -pglpi_dev_2026 -e 'SELECT 1' glpidb"]
      interval: 5s
      timeout: 3s
      retries: 30

  glpi:
    image: kbgen/glpi-web:1.0
    platform: linux/amd64   # GLPI upstream is amd64 — runs via Rosetta on Apple Silicon
    container_name: kbgen-glpi
    restart: unless-stopped
    depends_on:
      glpi-db:
        condition: service_healthy
    ports:
      - "9080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u glpi:glpi http://localhost/apirest.php/initSession || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  kbgen:
    image: kbgen:latest
    container_name: kbgen-app
    restart: unless-stopped
    depends_on:
      glpi:
        condition: service_healthy
    ports:
      - "8004:8004"
    environment:
      # ── REQUIRED — recipient supplies these two ─────────────────────
      DATABASE_URL: ${DATABASE_URL}      # external Postgres with pgvector
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ── Pre-wired to the bundled GLPI ───────────────────────────────
      ITSM_ADAPTER: glpi
      GLPI_URL: http://glpi/apirest.php
      GLPI_USER: glpi
      GLPI_PASSWORD: glpi
      POLL_INTERVAL_S: "60"
      DEDUP_THRESHOLD: "0.82"
      AUTO_SEED_ITSM: "false"            # GLPI is already seeded in the image
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8004/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
